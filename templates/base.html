<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Otter Finance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #F1ECE3;
            --surface:     #FDFAF6;
            --surface-2:   #EAE5DC;
            --border:      #DDD8CE;
            --ink:         #1C1917;
            --ink-2:       #57534E;
            --ink-3:       #A8A29E;
            --primary:     #1A3A2A;
            --primary-h:   #14532D;
            --accent:      #D97706;
            --accent-lt:   #FEF3C7;
            --income:      #166534;
            --income-lt:   #DCFCE7;
            --expense:     #9B1C1C;
            --expense-lt:  #FEE2E2;
            --bucket:      #1E3A8A;
            --bucket-lt:   #DBEAFE;
            --goal:        #5B21B6;
            --goal-lt:     #EDE9FE;
            --r:           8px;
        }

        [data-theme="dark"] {
            --bg:          #1C1917;
            --surface:     #242018;
            --surface-2:   #2C2820;
            --border:      #3D3730;
            --ink:         #F0EBE3;
            --ink-2:       #A8A29E;
            --ink-3:       #78716C;
            --primary:     #2D6A4F;
            --primary-h:   #40916C;
            --accent:      #F59E0B;
            --accent-lt:   #3D2400;
            --income:      #4ADE80;
            --income-lt:   #052E16;
            --expense:     #F87171;
            --expense-lt:  #3F0B0B;
            --bucket:      #60A5FA;
            --bucket-lt:   #0C1A4E;
            --goal:        #A78BFA;
            --goal-lt:     #2D1463;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: stretch;
            min-height: 50px;
        }
        .logo {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 17px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 22px;
            margin-right: 2px;
            border-right: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        nav {
            display: flex;
            align-items: stretch;
            flex: 1;
        }
        nav a {
            color: rgba(255,255,255,0.58);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 0 13px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, background 0.15s;
            letter-spacing: 0.01em;
        }
        nav a:hover { color: #fff; background: rgba(255,255,255,0.07); }
        nav a.active { color: #fff; border-bottom-color: var(--accent); }
        .nav-spacer { flex: 1; }
        .nav-sep { width: 1px; background: rgba(255,255,255,0.1); margin: 12px 4px; }
        .theme-toggle {
            background: none;
            border: none;
            color: rgba(255,255,255,0.58);
            font-size: 15px;
            cursor: pointer;
            padding: 0 13px;
            display: flex;
            align-items: center;
            transition: color 0.15s;
            font-family: inherit;
            line-height: 1;
        }
        .theme-toggle:hover { color: #fff; }

        /* ── Layout ── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 24px 72px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        /* ── Typography ── */
        h1 {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 26px;
            font-weight: 400;
            letter-spacing: -0.02em;
        }
        h2 {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 14px;
        }
        h3 {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 12px;
        }
        h4 { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .mono {
            font-family: "JetBrains Mono", monospace;
            font-variant-numeric: tabular-nums;
        }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-3);
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        .clickable-row { cursor: pointer; }
        .clickable-row:hover td { background: var(--bg); }

        /* ── Pills & Tags ── */
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: var(--surface-2);
            color: var(--ink-2);
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
            border: 1px solid transparent;
            line-height: 1;
            font-family: inherit;
            background: var(--primary);
            color: #fff;
        }
        .btn:hover { background: var(--primary-h); }
        .btn.secondary {
            background: transparent;
            color: var(--ink-2);
            border-color: var(--border);
        }
        .btn.secondary:hover { background: var(--surface-2); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        .action-btn {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s;
            font-family: inherit;
            line-height: 1.4;
        }
        .action-btn-edit {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--ink-2);
        }
        .action-btn-edit:hover { background: var(--surface-2); }
        .action-btn-del {
            background: transparent;
            border: 1px solid #FECACA;
            color: var(--expense);
            margin-left: 4px;
        }
        .action-btn-del:hover { background: var(--expense-lt); }

        /* ── Forms ── */
        form label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--ink-2);
            margin-bottom: 5px;
        }
        .field-wrap { margin-top: 16px; }
        form input, form select, form textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: "DM Sans", system-ui, sans-serif;
            background: var(--surface);
            color: var(--ink);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        form select[multiple] { min-height: 90px; }
        form input:focus, form select:focus, form textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
        }
        form button[type="submit"] {
            padding: 10px 22px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        form button[type="submit"]:hover { background: var(--primary-h); }
        .muted { color: var(--ink-2); }
        .help-text { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
    </style>
    <script>
    (function(){
        var stored = localStorage.getItem('theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="{% url 'finances:dashboard' %}" class="logo">🦦 Otter Finance</a>
        <nav>
            <a href="{% url 'finances:dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
            <a href="{% url 'finances:income_list' %}" {% if 'income' in request.resolver_match.url_name %}class="active"{% endif %}>Income</a>
            <a href="{% url 'finances:expense_list' %}" {% if 'expense' in request.resolver_match.url_name %}class="active"{% endif %}>Expenses</a>
            <a href="{% url 'finances:bucket_list' %}" {% if 'bucket' in request.resolver_match.url_name %}class="active"{% endif %}>Buckets</a>
            <a href="{% url 'finances:goal_list' %}" {% if 'goal' in request.resolver_match.url_name %}class="active"{% endif %}>Goals</a>
            <a href="{% url 'finances:tag_list' %}" {% if 'tag' in request.resolver_match.url_name %}class="active"{% endif %}>Tags</a>
            <div class="nav-spacer"></div>
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <div class="nav-sep"></div>
                    <a href="{% url 'admin:index' %}">Admin</a>
                {% endif %}
                <div class="nav-sep"></div>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
        </nav>
    </div>
</header>
<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="card" style="background:var(--accent-lt);border-color:#FDE68A;color:#92400E;margin-bottom:16px;padding:12px 18px;">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script>
(function(){
    var btn = document.getElementById('theme-toggle');
    function applyIcon(t){ btn.textContent = t === 'dark' ? '☀' : '☾'; }
    applyIcon(document.documentElement.getAttribute('data-theme'));
    btn.addEventListener('click', function(){
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        applyIcon(next);
    });
})();
</script>
</body>
</html>
