{% extends "base.html" %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h1>Tags</h1>
    <a class="btn" href="{% url 'finances:tag_add' %}">+ Add tag</a>
</div>

<div class="card" style="padding:0;overflow:hidden;">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Preview</th>
                <th>Color code</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for tag in tags %}
            <tr class="clickable-row" onclick="if(event.target.tagName!=='A')window.location='{% url 'finances:tag_edit' tag.pk %}';">
                <td><strong>{{ tag.name }}</strong></td>
                <td><span class="tag" style="background:{{ tag.color }}22;color:{{ tag.color }};">{{ tag.name }}</span></td>
                <td class="mono muted">{{ tag.color }}</td>
                <td style="white-space:nowrap;">
                    <a class="action-btn action-btn-edit" href="{% url 'finances:tag_edit' tag.pk %}" onclick="event.stopPropagation();">Edit</a>
                    <a class="action-btn action-btn-del" href="{% url 'finances:tag_delete' tag.pk %}" onclick="event.stopPropagation();">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="padding:28px;text-align:center;font-style:italic;" class="muted">
                    No tags yet. <a href="{% url 'finances:tag_add' %}" style="color:var(--primary);">Create your first tag.</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
