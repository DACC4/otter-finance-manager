{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width:440px;margin:48px auto 0;">
    <h2 style="margin-bottom:8px;">Delete {{ object }}</h2>
    <p style="color:var(--ink-2);margin-bottom:24px;">This action is permanent and cannot be undone. Are you sure you want to proceed?</p>
    <form method="post" style="display:flex;align-items:center;gap:10px;">
        {% csrf_token %}
        <button type="submit" style="background:var(--expense);padding:10px 18px;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;"
            onmouseover="this.style.background='#7F1D1D'" onmouseout="this.style.background='var(--expense)'">
            Delete permanently
        </button>
        <a class="btn secondary" href="{% url 'finances:dashboard' %}">Cancel</a>
    </form>
</div>
{% endblock %}
