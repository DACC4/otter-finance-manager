services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: otter
      POSTGRES_PASSWORD: otter
      POSTGRES_DB: otter
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otter -d otter"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: "replace-me"
      DJANGO_DEBUG: "False"
      DATABASE_URL: "postgres://otter:otter@db:5432/otter"
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
